<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Quiz Selection</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.1/css/all.min.css">
  <!-- Custom CSS -->
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body onload="checkLoginAndDisplayQuizSelection();">

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark fixed-top">
    <div class="container">
      <a class="navbar-brand d-flex align-items-center" href="quize.html">
        <img src="https://cdn-icons-png.flaticon.com/512/189/189665.png" alt="Quiz Logo" class="me-2"
          style="width: 40px; height: 40px; border-radius: 50%;">
        Quiz Master
      </a>

      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="quize.html">Home</a></li>
          <li class="nav-item"><a class="nav-link active" href="#">Quiz Selection</a></li>
          <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
          <li class="nav-item">
            <button class="btn btn-warning ms-3" data-bs-toggle="modal" data-bs-target="#loginModal"
              id="loginLogoutButton">
              <span id="loginLogoutText">Login</span>
            </button>
          </li>
          <li class="nav-item">
            <button class="btn btn-secondary ms-3" id="theme-toggle"><i class="fas fa-moon"></i></button>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container my-5 pt-5">
    <h1 class="text-center mb-4">Select Your Quiz</h1>
    <div id="quizSelectionContainer" class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4">
      <!-- Quiz cards will be injected here by JavaScript -->
    </div>
  </div>

  <!-- Login Modal -->
  <div class="modal fade" id="loginModal" tabindex="-1" aria-labelledby="loginModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="loginModalLabel">Login to Quiz Master</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <form id="loginForm">
            <div class="mb-3">
              <label for="email" class="form-label">Email address</label>
              <input type="email" class="form-control" id="email" placeholder="Enter your email" required>
            </div>
            <div class="mb-3">
              <label for="password" class="form-label">Password</label>
              <input type="password" class="form-control" id="password" placeholder="Enter your password" required>
            </div>
            <div id="loginError" class="alert alert-danger d-none" role="alert"></div>
            <button type="submit" class="btn btn-primary w-100">Login</button>
          </form>
        </div>
        <div class="modal-footer text-center">
          <small class="text-muted">Don’t have an account? <a href="#">Register</a></small>
        </div>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="text-center py-4">
    <div class="container">
      <p class="mb-0">&copy; 2025 Quiz Master | All Rights Reserved</p>
      <div class="mt-2">
        <a href="#" class="text-white me-3"><i class="fab fa-facebook-f"></i></a>
        <a href="#" class="text-white me-3"><i class="fab fa-twitter"></i></a>
        <a href="#" class="text-white"><i class="fab fa-instagram"></i></a>
      </div>
    </div>
  </footer>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Custom JS -->
  <script src="assets/js/script.js"></script>
  <script>
    const quizTitles = [
      "Web Development Basics",
      "General Knowledge",
      "Basic C Programming",
      "Basic Python Programming",
      "HTML Basics",
      "CSS Basics",
      "Computer Fundamentals",
      "Java Basics",
      "Database Management",
      "Operating System",
      "Networking Basics",
      "Aptitude & Reasoning",
      "Cyber Security",
      "Artificial Intelligence",
      "Sports",
      "Geography",
      "Science",
      "History",

    ];

    function displayQuizSelection() {
      const container = document.getElementById('quizSelectionContainer');
      container.innerHTML = ''; // Clear existing content

      quizTitles.forEach((title, index) => {
        const quizCard = `
        <div class="col">
          <div class="card h-100">
            <div class="card-body d-flex flex-column">
              <h5 class="card-title">${title}</h5>
              <p class="card-text">A challenging quiz on ${title.toLowerCase()}.</p>
              <a href="quizzes.html?quizIndex=${index}" class="btn btn-primary mt-auto">Start Quiz</a>
            </div>
          </div>
        </div>
      `;
        container.innerHTML += quizCard;
      });
    }

    function startQuiz(index) {
      window.location.href = `quizzes.html?quizIndex=${index}`;
    }

    function checkLoginAndDisplayQuizSelection() {
      updateLoginState(); // Update login button state
      if (sessionStorage.getItem('isLoggedIn') !== 'true') {
        // alert('Please log in to access the quizzes.');
        const container = document.getElementById('quizSelectionContainer');
        container.innerHTML = '<div class="col-12 text-center"><div class="card p-5"><p>Please log in to see the available quizzes.</p><button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#loginModal">Login</button></div></div>';
      } else {
        displayQuizSelection();
      }
    }

  </script>

</body>

</html>
