        </div>

        </div>
        <div class="modal-footer text-center">

          { q: "Which planet is closest to the Sun?", o: ["Venus", "Mercury", "Earth", "Mars"], a: "Mercury" },
          { q: "Humans breathe in ______ gas.", o: ["CO2", "Oxygen", "Nitrogen", "Hydrogen"], a: "Oxygen" },
          { q: "The powerhouse of the cell is ______", o: ["Nucleus", "Ribosome", "Mitochondria", "Chloroplast"], a: "Mitochondria" },
          { q: "Water freezes at ______ °C.", o: ["0", "10", "50", "100"], a: "0" },
          { q: "Which vitamin is from sunlight?", o: ["A", "B", "C", "D"], a: "D" },
          { q: "The hardest natural substance is ______", o: ["Gold", "Iron", "Diamond", "Silver"], a: "Diamond" },
          { q: "Blood is pumped by ______", o: ["Brain", "Heart", "Lungs", "Kidney"], a: "Heart" },
          { q: "Earth revolves around ______", o: ["Moon", "Mars", "Sun", "Venus"], a: "Sun" }
        ]
      },
      {
        title: "History",
        questions: [
          {
            q: "Who was the first President of the United States?",
            o: ["George Washington", "Thomas Jefferson", "Abraham Lincoln", "John Adams"],
            a: "George Washington"
          },
          {
            q: "In which year did World War II end?",
            o: ["1945", "1939", "1941", "1950"],
            a: "1945"
          }
          // Add more questions here
        ]
      },

    ];

    function showQuiz() {
      const urlParams = new URLSearchParams(window.location.search);
      const quizIndex = urlParams.get('quizIndex');

      if (quizIndex !== null && quizData[parseInt(quizIndex)]) {
        currentQuizIndex = parseInt(quizIndex);
      } else {
        currentQuizIndex = 0; // Default to the first quiz if no valid index is provided
      }

      const quiz = quizData[currentQuizIndex];
      document.getElementById('quizTitle').innerText = quiz.title;

      const quizContent = document.getElementById('quizContent');
      quizContent.innerHTML = '';

      quiz.questions.forEach((q, index) => {
        const questionDiv = document.createElement('div');
        questionDiv.classList.add('question');
        if (index === 0) questionDiv.classList.add('active-question');

        let optionsHtml = '';
        q.o.forEach(option => {
          optionsHtml += `
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="q${index}" value="${option}" id="q${index}_${option}">
                    <label class="form-check-label" for="q${index}_${option}">${option}</label>
                </div>
            `;
        });

        questionDiv.innerHTML = `<p>${index + 1}. ${q.q}</p>${optionsHtml}`;
        quizContent.appendChild(questionDiv);
      });

      userAnswers = Array(quiz.questions.length).fill(null);
      updateProgressBar();
      updateNavigationButtons();
    }

    function loadQuestion() {
      const questions = document.querySelectorAll('.question');
      questions.forEach((q, index) => {
        q.classList.toggle('active-question', index === currentQuestionIndex);
      });

      // Restore selected answer if available
      const selectedOption = userAnswers[currentQuestionIndex];
      if (selectedOption) {
        const radioInput = document.querySelector(`input[name="q${currentQuestionIndex}"][value="${selectedOption}"]`);
        if (radioInput) {
          radioInput.checked = true;
        }
      }
      updateProgressBar();
      updateNavigationButtons();
    }

    function saveAnswer() {
      const selected = document.querySelector(`input[name="q${currentQuestionIndex}"]:checked`);
      if (selected) {
        userAnswers[currentQuestionIndex] = selected.value;
      }
    }

    function updateProgressBar() {
      const totalQuestions = quizData[currentQuizIndex].questions.length;
      const progress = ((currentQuestionIndex + 1) / totalQuestions) * 100;
      document.getElementById('progressBar').style.width = `${progress}%`;
    }

    function updateNavigationButtons() {
      const totalQuestions = quizData[currentQuizIndex].questions.length;
      document.getElementById('prevQuestionBtn').style.display = currentQuestionIndex > 0 ? 'inline-block' : 'none';
      document.getElementById('nextQuestionBtn').style.display = currentQuestionIndex < totalQuestions - 1 ? 'inline-block' : 'none';
      document.getElementById('submitQuizBtn').style.display = currentQuestionIndex === totalQuestions - 1 ? 'inline-block' : 'none';
    }

    function nextQuestion() {
      saveAnswer();
      const totalQuestions = quizData[currentQuizIndex].questions.length;
      if (currentQuestionIndex < totalQuestions - 1) {
        currentQuestionIndex++;
        loadQuestion();
      }
    }

    function prevQuestion() {
      saveAnswer();
      if (currentQuestionIndex > 0) {
        currentQuestionIndex--;
        loadQuestion();
      }
    }

    function submitQuiz() {
      saveAnswer();
      let score = 0;
      const quiz = quizData[currentQuizIndex];

      quiz.questions.forEach((q, index) => {
        if (userAnswers[index] === q.a) {
          score++;
        }
      });

      const resultBox = document.getElementById('resultBox');
      resultBox.innerHTML = `
        <h4>Your Score: ${score} / ${quiz.questions.length}</h4>
        <ul class="list-group mt-3">
            ${quiz.questions.map((q, index) => `
                <li class="list-group-item d-flex justify-content-between align-items-center">
                    ${q.q}
                    <span class="badge bg-${userAnswers[index] === q.a ? 'success' : 'danger'}">${userAnswers[index] || 'Not Answered'}</span>
                    ${userAnswers[index] !== q.a ? `<span class="badge bg-info">${q.a}</span>` : ''}
                </li>
            `).join('')}
        </ul>
    `;
      document.getElementById('quizNavigation').style.display = 'none';
    }

  </script>
